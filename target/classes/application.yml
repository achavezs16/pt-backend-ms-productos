server:
  port: 8081
  servlet:
    context-path: /api/v1

spring:
  application:
    name: ms-productos

  datasource:
    url: jdbc:mysql://localhost:3309/ms_productos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd HH:mm:ss

rabbitmq:
  queues:
    pedido-creado: pedido.creado
    pedido-confirmado: pedido.confirmado
    inventario-actualizado: inventario.actualizado
  exchanges:
    pedidos: pedidos.exchange
  routing-keys:
    pedido-creado: pedido.creado
    pedido-confirmado: pedido.confirmado

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    cl.pymetrack.msproductos: DEBUG
    org.springframework.amqp: INFO
    org.hibernate.SQL: DEBUG
